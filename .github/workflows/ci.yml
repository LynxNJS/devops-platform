name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci-basics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show context
        run: |
          echo "Actor: $GITHUB_ACTOR"
          echo "Repo:  $GITHUB_REPOSITORY"
          echo "Ref:   $GITHUB_REF"
          echo "SHA:   $GITHUB_SHA"

      - name: List files
        run: ls -la

      - name: Smoke command
        run: echo "CI pipeline is alive ✅"
